<div class="auth-container">
    <svg class="auth-bg-svg" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
        <line x1="120" y1="100" x2="300" y2="200" stroke="rgba(139,92,246,0.15)" stroke-width="1.5" stroke-dasharray="6 4" class="conn-line"/>
        <line x1="300" y1="200" x2="500" y2="120" stroke="rgba(59,130,246,0.12)" stroke-width="1.5" stroke-dasharray="6 4" class="conn-line"/>
        <line x1="300" y1="200" x2="250" y2="400" stroke="rgba(6,182,212,0.12)" stroke-width="1.5" stroke-dasharray="6 4" class="conn-line"/>
        <line x1="500" y1="120" x2="680" y2="250" stroke="rgba(139,92,246,0.1)" stroke-width="1.5" stroke-dasharray="6 4" class="conn-line"/>
        <line x1="680" y1="250" x2="600" y2="450" stroke="rgba(59,130,246,0.1)" stroke-width="1.5" stroke-dasharray="6 4" class="conn-line"/>
        <line x1="250" y1="400" x2="600" y2="450" stroke="rgba(6,182,212,0.08)" stroke-width="1" stroke-dasharray="6 4" class="conn-line"/>
        <circle cx="120" cy="100" r="18" fill="rgba(139,92,246,0.12)" stroke="rgba(139,92,246,0.25)" stroke-width="1.5" class="node n1"/>
        <circle cx="120" cy="100" r="7" fill="rgba(139,92,246,0.3)"/>
        <circle cx="300" cy="200" r="24" fill="rgba(59,130,246,0.10)" stroke="rgba(59,130,246,0.2)" stroke-width="1.5" class="node n2"/>
        <circle cx="300" cy="200" r="9" fill="rgba(59,130,246,0.3)"/>
        <circle cx="500" cy="120" r="20" fill="rgba(6,182,212,0.10)" stroke="rgba(6,182,212,0.2)" stroke-width="1.5" class="node n3"/>
        <circle cx="500" cy="120" r="8" fill="rgba(6,182,212,0.3)"/>
        <circle cx="680" cy="250" r="16" fill="rgba(139,92,246,0.10)" stroke="rgba(139,92,246,0.2)" stroke-width="1.5" class="node n4"/>
        <circle cx="680" cy="250" r="6" fill="rgba(139,92,246,0.25)"/>
        <circle cx="250" cy="400" r="22" fill="rgba(59,130,246,0.08)" stroke="rgba(59,130,246,0.15)" stroke-width="1.5" class="node n5"/>
        <circle cx="250" cy="400" r="8" fill="rgba(59,130,246,0.25)"/>
        <circle cx="600" cy="450" r="15" fill="rgba(6,182,212,0.08)" stroke="rgba(6,182,212,0.15)" stroke-width="1.5" class="node n6"/>
        <circle cx="600" cy="450" r="6" fill="rgba(6,182,212,0.2)"/>
        <circle cx="300" cy="200" r="24" fill="none" stroke="rgba(59,130,246,0.15)" stroke-width="1" class="pulse"/>
        <circle cx="500" cy="120" r="20" fill="none" stroke="rgba(6,182,212,0.12)" stroke-width="1" class="pulse p2"/>
    </svg>
    <div class="auth-card glass-card">
        <div class="back-link" (click)="goBack()">
            <i class="fa-solid fa-arrow-left"></i> Back to Login
        </div>

        <div class="auth-header">
            <div class="logo-circle">
                <i class="fa-solid fa-bolt"></i>
            </div>
            <h1>Secure Reset</h1>
            <p>Enter the 6-digit OTP from your email to set a new password.</p>
        </div>

        <div *ngIf="error" class="error-alert">
            <i class="fa-solid fa-triangle-exclamation"></i>
            {{ error }}
        </div>

        <div *ngIf="message" class="success-alert"
            style="background: rgba(46, 204, 113, 0.1); color: #2ecc71; padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.75rem;">
            <i class="fa-solid fa-check-circle"></i>
            {{ message }}
        </div>

        <form (ngSubmit)="onSubmit()" #resetForm="ngForm" *ngIf="!message">
            <div class="input-group">
                <label for="otp">6-Digit OTP</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-key icon"></i>
                    <input type="text" id="otp" name="otp" [(ngModel)]="otp" required
                        placeholder="Enter the OTP from your email" minlength="6" maxlength="6">
                </div>
            </div>

            <div class="input-group">
                <label for="newPassword">New Password</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock icon"></i>
                    <input [type]="showPassword ? 'text' : 'password'" id="newPassword" name="newPassword"
                        [(ngModel)]="newPassword" required placeholder="••••••••" minlength="6">
                    <i class="fa-solid password-toggle" [class.fa-eye]="!showPassword"
                        [class.fa-eye-slash]="showPassword" (click)="showPassword = !showPassword"></i>
                </div>
            </div>

            <div class="input-group">
                <label for="confirmPassword">Confirm Password</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock icon"></i>
                    <input [type]="showConfirmPassword ? 'text' : 'password'" id="confirmPassword"
                        name="confirmPassword" [(ngModel)]="confirmPassword" required placeholder="••••••••"
                        minlength="6">
                    <i class="fa-solid password-toggle" [class.fa-eye]="!showConfirmPassword"
                        [class.fa-eye-slash]="showConfirmPassword"
                        (click)="showConfirmPassword = !showConfirmPassword"></i>
                </div>
            </div>

            <button type="submit" class="btn-primary login-btn" [disabled]="!resetForm.valid || isSubmitting || !otp"
                style="margin-top: 1rem;">
                <i *ngIf="isSubmitting" class="fa-solid fa-circle-notch fa-spin"></i>
                <span>{{ isSubmitting ? 'Resetting...' : 'Change Password' }}</span>
            </button>
        </form>
    </div>
</div>
